<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerts</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/app.js" defer></script>
</head>
<body data-page="alerts">
  <div class="page-shell">
    <div id="app-nav"></div>

    <section class="card">
      <h1>Alerts</h1>
      <p class="small-text">View all alerts saved in the system.</p>
      <button id="refresh-alerts" type="button">Refresh Alerts</button>
      <div id="alerts-message" class="message hidden"></div>
    </section>

    <section class="card">
      <div id="alerts-list" class="list">
        <div class="list-item">Loading alerts...</div>
      </div>
    </section>
  </div>
</body>
</html>
